# ==============================================================================
# Backwoods: Полностью автоматическая сборка iOS IPA
# ==============================================================================
# Этот workflow делает ВСЁ:
#   1. Клонирует upstream Telegram-iOS
#   2. Клонирует wireguard-apple и собирает WireGuardKit
#   3. Копирует модули Backwoods в дерево Telegram
#   4. Автоматически патчит BUILD + AppDelegate
#   5. Собирает IPA через Bazel
#   6. Загружает IPA как артефакт
#
# Тебе нужен ТОЛЬКО этот репозиторий на GitHub. Ни Mac, ни Xcode не нужны.
#
# Секреты (GitHub Settings → Secrets):
#   Обязательные:
#     TUNNEL_CONFIG_JSON — содержимое backwoods-tunnel.json с реальными ключами
#   Опционально (для подписи):
#     SIGNING_CERTIFICATE_P12_BASE64 — сертификат разработчика
#     SIGNING_CERTIFICATE_PASSWORD — пароль сертификата
#     KEYCHAIN_PASSWORD — любой пароль для временного keychain
#     APP_PROVISIONING_PROFILE_BASE64 — профиль основного приложения
#     TUNNEL_PROVISIONING_PROFILE_BASE64 — профиль расширения
# ==============================================================================

name: "🔨 Build Backwoods IPA"

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      telegram_ref:
        description: 'Telegram-iOS git ref (тег или ветка)'
        required: false
        default: 'master'
      skip_tests:
        description: 'Пропустить тесты'
        required: false
        type: boolean
        default: false
      unsigned_build:
        description: 'Сборка без подписи (для TrollStore)'
        required: false
        type: boolean
        default: true

env:
  XCODE_VERSION: "15.4"
  GO_VERSION: "1.22"
  TELEGRAM_REPO: "https://github.com/nicegram/nicegram-ios.git"
  TELEGRAM_REF: ${{ github.event.inputs.telegram_ref || 'master' }}
  WIREGUARD_REPO: "https://github.com/WireGuard/wireguard-apple.git"

jobs:
  build:
    name: "🏗 Сборка IPA"
    runs-on: macos-14
    timeout-minutes: 180

    steps:
      # ================================================================
      # ПОДГОТОВКА
      # ================================================================

      - name: "📥 Checkout Backwoods"
        uses: actions/checkout@v4
        with:
          path: backwoods

      - name: "🍎 Setup Xcode"
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: "🐹 Setup Go (для wireguard-go)"
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: "📦 Install Bazel"
        run: |
          brew install bazelisk
          echo "Bazel version:"
          bazel --version

      - name: "💾 Cache — Bazel"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-macos14-${{ hashFiles('backwoods/**/BUILD') }}
          restore-keys: |
            bazel-macos14-

      # ================================================================
      # КЛОНИРОВАНИЕ TELEGRAM-iOS
      # ================================================================

      - name: "📥 Клонирование Telegram-iOS"
        run: |
          echo ">>> Cloning Telegram-iOS (ref: $TELEGRAM_REF)..."
          git clone --depth 1 --branch "$TELEGRAM_REF" "$TELEGRAM_REPO" telegram-ios 2>/dev/null || {
            echo "Branch $TELEGRAM_REF not found, trying without --branch..."
            git clone --depth 1 "$TELEGRAM_REPO" telegram-ios
          }

          cd telegram-ios

          # Step 1: init registers all submodules from .gitmodules into .git/config
          git submodule init

          # Step 2: remove tgcalls from .git/config ONLY (leave .gitmodules intact).
          # tgcalls is at git@bitbucket.org:mobyrix/tgcalls.git — private, SSH-only.
          # It is only used for VoIP; not needed for VPN functionality.
          git config --remove-section "submodule.submodules/TgVoipWebrtc/tgcalls" 2>/dev/null \
            && echo "Skipping tgcalls (private Bitbucket)" \
            || echo "tgcalls section not found in .git/config, continuing"

          # Step 3: update only the submodules now registered in .git/config (tgcalls excluded)
          git submodule update --recursive

          cd ..
          echo "Telegram-iOS cloned OK"
          ls -la telegram-ios/

      # ================================================================
      # СБОРКА WireGuardKit
      # ================================================================

      - name: "📥 Клонирование wireguard-apple"
        run: |
          echo ">>> Клонирую wireguard-apple..."
          git clone --depth 1 "$WIREGUARD_REPO" wireguard-apple
          echo "✅ wireguard-apple клонирован"

      - name: "🔧 Сборка WireGuardKit.xcframework"
        run: |
          cd wireguard-apple

          # ── Шаг 1: Build libwg-go.a (Go → iOS arm64 static lib) ──────────────
          # WireGuardKitGo target в Package.swift ожидает libwg-go.a уже готовым.
          # Package.swift не запускает make сам — это делают build phases в xcodeproj,
          # которого у нас нет (shared schemes отсутствуют). Собираем вручную.
          echo "=== Building libwg-go.a for iOS arm64 ==="
          GOLIB_DIR="$RUNNER_TEMP/wg-golib"
          mkdir -p "$GOLIB_DIR"

          cd Sources/WireGuardKitGo
          make \
            PLATFORM_NAME=iphoneos \
            ARCHS=arm64 \
            SDKROOT="$(xcrun --sdk iphoneos --show-sdk-path)" \
            CONFIGURATION_BUILD_DIR="$GOLIB_DIR" \
            CONFIGURATION_TEMP_DIR="$GOLIB_DIR/.tmp"

          echo "Go build output:"
          ls -la "$GOLIB_DIR/"
          cd ../..

          # ── Шаг 2: Patch Package.swift ──────────────────────────────────────
          # swift-tools-version:5.3 не знает .macOS(.v12) и .iOS(.v15)
          # (эти enum cases появились в 5.5). Патчим на месте.
          echo "=== Patching Package.swift swift-tools-version 5.3 → 5.5 ==="
          sed -i '' 's|swift-tools-version:5.3|swift-tools-version:5.5|' Package.swift
          head -3 Package.swift

          # ── Шаг 3: Убираем xcodeproj ─────────────────────────────────────────
          # WireGuard.xcodeproj не имеет ни одного shared .xcscheme файла.
          # Без xcodeproj xcodebuild использует Package.swift где есть схема WireGuardKit.
          echo "=== Removing WireGuard.xcodeproj (no shared schemes there) ==="
          mv WireGuard.xcodeproj WireGuard.xcodeproj.bak
          echo "Available now:"
          ls -la

          # ── Шаг 4: xcodebuild build с Package.swift ───────────────────────────
          echo "=== Building WireGuardKit via xcodebuild (Package.swift) ==="
          WGKIT_DERIVED="$RUNNER_TEMP/wgkit-derived"

          xcodebuild build \
            -scheme WireGuardKit \
            -destination "generic/platform=iOS" \
            -configuration Release \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            SKIP_INSTALL=NO \
            LIBRARY_SEARCH_PATHS="$GOLIB_DIR" \
            -derivedDataPath "$WGKIT_DERIVED" \
            2>&1 | tail -60

          # ── Шаг 5: Упаковываем xcframework ────────────────────────────────────
          echo "=== Frameworks found ==="
          find "$WGKIT_DERIVED" -name "*.framework" -type d 2>/dev/null | head -20

          FW_PATH=$(find "$WGKIT_DERIVED" -name "WireGuardKit.framework" -type d 2>/dev/null | head -1)
          echo "Framework: $FW_PATH"

          if [ -z "$FW_PATH" ]; then
            echo "ERROR: WireGuardKit.framework не найден"
            find "$WGKIT_DERIVED" -type d 2>/dev/null | head -60
            exit 1
          fi

          mkdir -p ../telegram-ios/third-party/WireGuardKit
          xcodebuild -create-xcframework \
            -framework "$FW_PATH" \
            -output ../telegram-ios/third-party/WireGuardKit/WireGuardKit.xcframework

          echo "WireGuardKit.xcframework created OK"

      # ================================================================
      # ПРИМЕНЕНИЕ ПАТЧЕЙ BACKWOODS
      # ================================================================

      - name: "🔧 Применение патчей Backwoods"
        run: |
          chmod +x backwoods/scripts/apply-patches.sh
          bash backwoods/scripts/apply-patches.sh telegram-ios backwoods
          echo "✅ Патчи Backwoods применены"

      - name: "🔑 Вставка конфигурации туннеля"
        env:
          TUNNEL_CONFIG: ${{ secrets.TUNNEL_CONFIG_JSON }}
        run: |
          if [ -n "$TUNNEL_CONFIG" ]; then
            echo "$TUNNEL_CONFIG" > telegram-ios/Telegram/backwoods-tunnel.json
            echo "✅ Конфигурация туннеля вставлена из секрета"
          else
            echo "⚠️  TUNNEL_CONFIG_JSON секрет не задан!"
            echo "⚠️  Используется шаблон — IPA не будет подключаться к VPN"
            echo "⚠️  Добавьте TUNNEL_CONFIG_JSON в GitHub Settings → Secrets"
          fi

      # ================================================================
      # ПОДПИСЬ (опционально)
      # ================================================================

      - name: "🔐 Установка сертификата подписи"
        if: ${{ !inputs.unsigned_build && github.event_name != 'pull_request' }}
        env:
          P12_BASE64: ${{ secrets.SIGNING_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$P12_BASE64" ]; then
            echo "⚠️  Сертификат не настроен — будет собрано без подписи"
            exit 0
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 7200 -u build.keychain

          echo "$P12_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain \
            -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

          echo "✅ Сертификат установлен"

      - name: "📋 Установка provisioning profiles"
        if: ${{ !inputs.unsigned_build && github.event_name != 'pull_request' }}
        env:
          APP_PROFILE_BASE64: ${{ secrets.APP_PROVISIONING_PROFILE_BASE64 }}
          TUNNEL_PROFILE_BASE64: ${{ secrets.TUNNEL_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$APP_PROFILE_BASE64" ]; then
            echo "⚠️  Профили не настроены — пропуск"
            exit 0
          fi

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APP_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/app.mobileprovision
          echo "$TUNNEL_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/tunnel.mobileprovision

          echo "✅ Provisioning profiles установлены"

      # ================================================================
      # ТЕСТЫ
      # ================================================================

      - name: "🧪 Юнит-тесты"
        if: ${{ !inputs.skip_tests }}
        working-directory: telegram-ios
        run: |
          echo ">>> Запуск тестов..."
          bazel test \
            //Tests:TunnelKitTests \
            //Tests:TunnelManagerTests \
            //Tests:WireGuardTransportTests \
            --test_output=errors \
            --verbose_failures \
            --keep_going \
            || echo "⚠️  Некоторые тесты не прошли (продолжаем сборку)"
          echo "✅ Тесты завершены"

      # ================================================================
      # СБОРКА
      # ================================================================

      - name: "🏗 Сборка Telegram IPA"
        working-directory: telegram-ios
        run: |
          echo ">>> Сборка Backwoods IPA..."
          echo "  Дата сборки: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "  Build number: $(date +%Y%m%d%H%M)"

          python3 build-system/Make/Make.py \
            --cacheDir="$HOME/bazel-cache" \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --buildNumber="$(date +%Y%m%d%H%M)" \
            --configuration=release_arm64 \
            2>&1 | tee build.log

          echo "✅ Сборка завершена"

      # ================================================================
      # УПАКОВКА IPA
      # ================================================================

      - name: "📦 Упаковка IPA"
        run: |
          echo ">>> Поиск собранного приложения..."

          # Ищем .app в нескольких местах
          APP_PATH=$(find telegram-ios/bazel-bin -name "Telegram.app" -type d 2>/dev/null | head -1)

          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find telegram-ios -name "*.app" -type d -path "*/Release*" 2>/dev/null | head -1)
          fi

          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find telegram-ios -name "*.app" -type d 2>/dev/null | head -1)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "❌ Telegram.app не найден!"
            echo "Содержимое bazel-bin:"
            find telegram-ios/bazel-bin -type d -maxdepth 4 2>/dev/null || true
            exit 1
          fi

          echo "  Найден: $APP_PATH"

          # Создаём IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r -9 Backwoods.ipa Payload/
          rm -rf Payload/

          # Информация
          IPA_SIZE=$(du -h Backwoods.ipa | cut -f1)
          echo ""
          echo "=============================================="
          echo "  ✅ Backwoods.ipa собран!"
          echo "  Размер: $IPA_SIZE"
          echo "  SHA256: $(shasum -a 256 Backwoods.ipa | cut -d' ' -f1)"
          echo "=============================================="

      # ================================================================
      # ЗАГРУЗКА
      # ================================================================

      - name: "📤 Загрузка IPA"
        uses: actions/upload-artifact@v4
        with:
          name: "Backwoods-${{ github.sha }}"
          path: Backwoods.ipa
          retention-days: 90

      - name: "📤 Загрузка логов сборки"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "build-logs-${{ github.sha }}"
          path: telegram-ios/build.log
          retention-days: 7

      # ================================================================
      # РЕЛИЗ (при тегах v*)
      # ================================================================

      - name: "🚀 Создание релиза"
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Backwoods.ipa
          generate_release_notes: true
          body: |
            ## Backwoods ${{ github.ref_name }}

            📱 **Установка:**
            - Скачайте `Backwoods.ipa`
            - Установите через TrollStore или AltStore

            ⚠️ **Перед использованием** убедитесь, что VPN конфигурация вшита в сборку.

      # ================================================================
      # ОЧИСТКА
      # ================================================================

      - name: "🧹 Очистка"
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
