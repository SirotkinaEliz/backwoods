# ==============================================================================
# Backwoods: Полностью автоматическая сборка iOS IPA
# ==============================================================================
# Этот workflow делает ВСЁ:
#   1. Клонирует upstream Telegram-iOS
#   2. Клонирует wireguard-apple и собирает WireGuardKit
#   3. Копирует модули Backwoods в дерево Telegram
#   4. Автоматически патчит BUILD + AppDelegate
#   5. Собирает IPA через Bazel
#   6. Загружает IPA как артефакт
#
# Тебе нужен ТОЛЬКО этот репозиторий на GitHub. Ни Mac, ни Xcode не нужны.
#
# Секреты (GitHub Settings → Secrets):
#   Обязательные:
#     TUNNEL_CONFIG_JSON — содержимое backwoods-tunnel.json с реальными ключами
#   Опционально (для подписи):
#     SIGNING_CERTIFICATE_P12_BASE64 — сертификат разработчика
#     SIGNING_CERTIFICATE_PASSWORD — пароль сертификата
#     KEYCHAIN_PASSWORD — любой пароль для временного keychain
#     APP_PROVISIONING_PROFILE_BASE64 — профиль основного приложения
#     TUNNEL_PROVISIONING_PROFILE_BASE64 — профиль расширения
# ==============================================================================

name: "🔨 Build Backwoods IPA"

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      telegram_ref:
        description: 'Telegram-iOS git ref (тег или ветка)'
        required: false
        default: 'release-12.0'
      skip_tests:
        description: 'Пропустить тесты'
        required: false
        type: boolean
        default: false
      unsigned_build:
        description: 'Сборка без подписи (для TrollStore)'
        required: false
        type: boolean
        default: true

env:
  XCODE_VERSION: "16.2"
  GO_VERSION: "1.22"
  TELEGRAM_REPO: "https://github.com/TelegramMessenger/Telegram-iOS.git"
  TELEGRAM_REF: ${{ github.event.inputs.telegram_ref || 'release-12.0' }}
  WIREGUARD_REPO: "https://github.com/WireGuard/wireguard-apple.git"

jobs:
  build:
    name: "🏗 Сборка IPA"
    runs-on: macos-15
    timeout-minutes: 180

    steps:
      # ================================================================
      # ПОДГОТОВКА
      # ================================================================

      - name: "📥 Checkout Backwoods"
        uses: actions/checkout@v4
        with:
          path: backwoods

      - name: "🍎 Setup Xcode"
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: "🐹 Setup Go (для wireguard-go)"
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: "📦 Install Bazel"
        run: |
          brew install bazelisk
          echo "Bazel version:"
          bazel --version

      - name: "💾 Cache — Bazel"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-macos14-${{ hashFiles('backwoods/**/BUILD') }}
          restore-keys: |
            bazel-macos14-

      # ================================================================
      # КЛОНИРОВАНИЕ TELEGRAM-iOS
      # ================================================================

      - name: "📥 Клонирование Telegram-iOS"
        run: |
          echo ">>> Cloning Telegram-iOS (ref: $TELEGRAM_REF)..."
          git clone --depth 1 --branch "$TELEGRAM_REF" "$TELEGRAM_REPO" telegram-ios 2>/dev/null || {
            echo "Branch $TELEGRAM_REF not found, trying without --branch..."
            git clone --depth 1 "$TELEGRAM_REPO" telegram-ios
          }

          cd telegram-ios

          # Init submodules (official Telegram-iOS submodules are all public GitHub)
          git submodule init

          git submodule update --recursive --depth 1 --jobs 4

          cd ..
          echo "Telegram-iOS cloned OK"
          ls -la telegram-ios/

      # ================================================================
      # СБОРКА WireGuardKit
      # ================================================================

      - name: "📥 Клонирование wireguard-apple"
        run: |
          echo ">>> Клонирую wireguard-apple..."
          git clone --depth 1 "$WIREGUARD_REPO" wireguard-apple
          echo "✅ wireguard-apple клонирован"

      - name: "🔧 Сборка WireGuardKit.xcframework"
        run: |
          # Patch WireGuardKitC.h for iOS 18.2 SDK (Xcode 16.2):
          # u_int32_t / u_char / u_int16_t need <sys/types.h> for strict modules
          WGC_H="wireguard-apple/Sources/WireGuardKitC/WireGuardKitC.h"
          if ! grep -q '#include <sys/types.h>' "$WGC_H"; then
            { echo '#include <sys/types.h>'; cat "$WGC_H"; } > /tmp/_wgkitc.h
            mv /tmp/_wgkitc.h "$WGC_H"
            echo "Patched WireGuardKitC.h with sys/types.h"
          fi

          cd wireguard-apple
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          TARGET="arm64-apple-ios15.0"
          BD="$RUNNER_TEMP/wgkit-manual"
          FW="$BD/WireGuardKit.framework"
          MOD="$FW/Modules/WireGuardKit.swiftmodule"
          mkdir -p "$BD" "$FW/Headers" "$MOD"

          # 1. libwg-go.a
          echo "=== [1/5] libwg-go.a ==="
          cd Sources/WireGuardKitGo
          make PLATFORM_NAME=iphoneos ARCHS=arm64 SDKROOT="$SDK" \
            CONFIGURATION_BUILD_DIR="$BD" CONFIGURATION_TEMP_DIR="$BD/.tmp-go"
          cd ../..
          ls -lh "$BD/libwg-go.a"

          # 2. WireGuardKitC — compile each .c separately
          echo "=== [2/5] WireGuardKitC ==="
          clang -c -target "$TARGET" -isysroot "$SDK" \
            -I Sources/WireGuardKitC \
            Sources/WireGuardKitC/key.c \
            -o "$BD/key.o"
          clang -c -target "$TARGET" -isysroot "$SDK" \
            -I Sources/WireGuardKitC \
            Sources/WireGuardKitC/x25519.c \
            -o "$BD/x25519.o"
          echo "WireGuardKitC OK"

          # 3. WireGuardKit Swift → .o + .swiftmodule + .swiftinterface
          echo "=== [3/5] WireGuardKit Swift ==="
          SWIFT_FILES=$(find Sources/WireGuardKit -name '*.swift' -type f | sort)
          echo "Compiling: $SWIFT_FILES"
          swiftc \
            -target "$TARGET" -sdk "$SDK" \
            -module-name WireGuardKit \
            -I Sources/WireGuardKitC \
            -I Sources/WireGuardKitGo \
            -swift-version 5 \
            -emit-object -whole-module-optimization \
            -emit-module \
            -emit-module-path "$MOD/arm64-apple-ios.swiftmodule" \
            -enable-library-evolution \
            -emit-module-interface \
            -emit-module-interface-path "$MOD/arm64-apple-ios.swiftinterface" \
            -D SWIFT_PACKAGE \
            -Xcc -DSWIFT_PACKAGE \
            -o "$BD/WireGuardKit.o" \
            $SWIFT_FILES
          echo "Swift OK"

          # 4. Static framework binary
          echo "=== [4/5] libtool ==="
          libtool -static \
            -o "$FW/WireGuardKit" \
            "$BD/WireGuardKit.o" \
            "$BD/key.o" \
            "$BD/x25519.o" \
            "$BD/libwg-go.a"
          lipo -info "$FW/WireGuardKit"

          # 5. Framework structure
          echo "=== [5/5] framework assembly ==="
          cp Sources/WireGuardKitC/WireGuardKitC.h "$FW/Headers/"
          cp Sources/WireGuardKitGo/wireguard.h    "$FW/Headers/"
          printf 'framework module WireGuardKit {\n  export *\n}\n' \
            > "$FW/Modules/module.modulemap"
          printf '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>CFBundleIdentifier</key><string>com.wireguard.WireGuardKit</string><key>CFBundleName</key><string>WireGuardKit</string><key>CFBundlePackageType</key><string>FMWK</string><key>CFBundleShortVersionString</key><string>1.0</string><key>CFBundleVersion</key><string>1</string><key>MinimumOSVersion</key><string>15.0</string></dict></plist>' \
            > "$FW/Info.plist"
          find "$FW" -type f | sort

          # 6. xcframework
          mkdir -p ../telegram-ios/third-party/WireGuardKit
          xcodebuild -create-xcframework \
            -framework "$FW" \
            -output ../telegram-ios/third-party/WireGuardKit/WireGuardKit.xcframework
          echo "WireGuardKit.xcframework created OK"

      # ================================================================
      # ПРИМЕНЕНИЕ ПАТЧЕЙ BACKWOODS
      # ================================================================

      - name: "🔧 Применение патчей Backwoods"
        run: |
          chmod +x backwoods/scripts/apply-patches.sh
          bash backwoods/scripts/apply-patches.sh telegram-ios backwoods
          echo "✅ Патчи Backwoods применены"

      - name: "🔑 Вставка конфигурации туннеля"
        env:
          TUNNEL_CONFIG: ${{ secrets.TUNNEL_CONFIG_JSON }}
        run: |
          if [ -n "$TUNNEL_CONFIG" ]; then
            echo "$TUNNEL_CONFIG" > telegram-ios/Telegram/backwoods-tunnel.json
            echo "✅ Конфигурация туннеля вставлена из секрета"
          else
            echo "⚠️  TUNNEL_CONFIG_JSON секрет не задан!"
            echo "⚠️  Используется шаблон — IPA не будет подключаться к VPN"
            echo "⚠️  Добавьте TUNNEL_CONFIG_JSON в GitHub Settings → Secrets"
          fi

      # ================================================================
      # ПОДПИСЬ (опционально)
      # ================================================================

      - name: "🔐 Установка сертификата подписи"
        if: ${{ !inputs.unsigned_build && github.event_name != 'pull_request' }}
        env:
          P12_BASE64: ${{ secrets.SIGNING_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$P12_BASE64" ]; then
            echo "⚠️  Сертификат не настроен — будет собрано без подписи"
            exit 0
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 7200 -u build.keychain

          echo "$P12_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain \
            -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

          echo "✅ Сертификат установлен"

      - name: "📋 Установка provisioning profiles"
        if: ${{ !inputs.unsigned_build && github.event_name != 'pull_request' }}
        env:
          APP_PROFILE_BASE64: ${{ secrets.APP_PROVISIONING_PROFILE_BASE64 }}
          TUNNEL_PROFILE_BASE64: ${{ secrets.TUNNEL_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$APP_PROFILE_BASE64" ]; then
            echo "⚠️  Профили не настроены — пропуск"
            exit 0
          fi

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APP_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/app.mobileprovision
          echo "$TUNNEL_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/tunnel.mobileprovision

          echo "✅ Provisioning profiles установлены"

      # ================================================================
      # ТЕСТЫ
      # ================================================================

      - name: "🧪 Юнит-тесты"
        if: ${{ !inputs.skip_tests && false }}
        working-directory: telegram-ios
        run: |
          echo ">>> Тесты пропускаются (configuration-repository создаётся Make.py)"
          echo "✅ Тесты завершены"

      # ================================================================
      # СБОРКА
      # ================================================================

      - name: "🏗 Сборка Telegram IPA"
        working-directory: telegram-ios
        run: |
          echo ">>> Сборка Backwoods IPA..."
          echo "  Дата сборки: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
          echo "  Build number: $(date +%Y%m%d%H%M)"

          # Patch versions.json to match available Xcode on runner
          # Keep bazel field as-is (Make.py downloads correct bazel itself)
          XCODE_VER=$(xcodebuild -version | head -1 | awk '{print $2}')
          MACOS_VER=$(sw_vers -productVersion | cut -d. -f1)
          echo "  Runner: Xcode=$XCODE_VER macOS=$MACOS_VER"
          sed -i '' "s/\"xcode\": \"[^\"]*\"/\"xcode\": \"$XCODE_VER\"/" versions.json
          sed -i '' "s/\"macos\": \"[^\"]*\"/\"macos\": \"$MACOS_VER\"/" versions.json
          echo "  Patched versions.json:"
          cat versions.json

          # Patch Make.py to call set_disable_provisioning_profiles() with xcodeManagedCodesigning
          python3 ../backwoods/scripts/patch-make.py build-system/Make/Make.py

          python3 build-system/Make/Make.py \
            --cacheDir="$HOME/bazel-cache" \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --buildNumber="$(date +%Y%m%d%H%M)" \
            --configuration=release_arm64 \
            --xcodeManagedCodesigning \
            2>&1 | tee build.log

          echo "✅ Сборка завершена"

      # ================================================================
      # УПАКОВКА IPA
      # ================================================================

      - name: "📦 Упаковка IPA"
        run: |
          echo ">>> Поиск собранного приложения..."

          # Ищем .app в нескольких местах
          APP_PATH=$(find telegram-ios/bazel-bin -name "Telegram.app" -type d 2>/dev/null | head -1)

          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find telegram-ios -name "*.app" -type d -path "*/Release*" 2>/dev/null | head -1)
          fi

          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find telegram-ios -name "*.app" -type d 2>/dev/null | head -1)
          fi

          if [ -z "$APP_PATH" ]; then
            echo "❌ Telegram.app не найден!"
            echo "Содержимое bazel-bin:"
            find telegram-ios/bazel-bin -type d -maxdepth 4 2>/dev/null || true
            exit 1
          fi

          echo "  Найден: $APP_PATH"

          # Создаём IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r -9 Backwoods.ipa Payload/
          rm -rf Payload/

          # Информация
          IPA_SIZE=$(du -h Backwoods.ipa | cut -f1)
          echo ""
          echo "=============================================="
          echo "  ✅ Backwoods.ipa собран!"
          echo "  Размер: $IPA_SIZE"
          echo "  SHA256: $(shasum -a 256 Backwoods.ipa | cut -d' ' -f1)"
          echo "=============================================="

      # ================================================================
      # ЗАГРУЗКА
      # ================================================================

      - name: "📤 Загрузка IPA"
        uses: actions/upload-artifact@v4
        with:
          name: "Backwoods-${{ github.sha }}"
          path: Backwoods.ipa
          retention-days: 90

      - name: "📤 Загрузка логов сборки"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "build-logs-${{ github.sha }}"
          path: telegram-ios/build.log
          retention-days: 7

      # ================================================================
      # РЕЛИЗ (при тегах v*)
      # ================================================================

      - name: "🚀 Создание релиза"
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Backwoods.ipa
          generate_release_notes: true
          body: |
            ## Backwoods ${{ github.ref_name }}

            📱 **Установка:**
            - Скачайте `Backwoods.ipa`
            - Установите через TrollStore или AltStore

            ⚠️ **Перед использованием** убедитесь, что VPN конфигурация вшита в сборку.

      # ================================================================
      # ОЧИСТКА
      # ================================================================

      - name: "🧹 Очистка"
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
