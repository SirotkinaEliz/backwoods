name: "🤖 Build GLUSH Android APK"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout our repo ────────────────────────────────────────────────
      - name: Checkout backwoods
        uses: actions/checkout@v4
        with:
          path: backwoods

      # ── 2. JDK 17 ───────────────────────────────────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      # ── 3. Android SDK (already on ubuntu-latest) ───────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Inject tunnel config ─────────────────────────────────────────────
      - name: Inject tunnel.conf
        env:
          TUNNEL_CONFIG_JSON: ${{ secrets.TUNNEL_CONFIG_JSON }}
        run: |
          echo "$TUNNEL_CONFIG_JSON" > /tmp/tunnel_input.json
          python3 backwoods/scripts/json2wgconf.py \
            /tmp/tunnel_input.json \
            backwoods/android/app/src/main/res/raw/tunnel.conf
          echo "tunnel.conf written"

      # ── 5. Build debug APK (no signing needed for sideloading) ─────────────
      - name: Build Release APK
        working-directory: backwoods/android
        run: |
          chmod +x gradlew 2>/dev/null || true
          # Generate Gradle wrapper if missing
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.4
          fi
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Pandroid.injected.signing.store.file="" \
            -Pandroid.injected.signing.key.alias="" \
            -Pandroid.injected.signing.store.password="" \
            -Pandroid.injected.signing.key.password=""

      # ── 6. Rename APK ────────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          find backwoods/android/app/build/outputs/apk -name "*.apk" | head -1 | \
            xargs -I{} cp {} /tmp/GLUSH-android-${{ github.run_number }}.apk
          ls -lh /tmp/GLUSH-android-*.apk

      # ── 7. Upload artifact ───────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GLUSH-android-${{ github.sha }}
          path: /tmp/GLUSH-android-${{ github.run_number }}.apk
          retention-days: 30

      # ── 8. Create GitHub Release ─────────────────────────────────────────────
      - name: Create Android Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-build-${{ github.run_number }}
          name: "GLUSH Android build-${{ github.run_number }}"
          body: |
            ## GLUSH VPN — Android APK

            **Версия:** build-${{ github.run_number }}
            **Минимальный Android:** 5.0 (API 21)

            ### Установка
            1. Скачайте `.apk` файл на телефон
            2. Откройте файл менеджер → нажмите на APK
            3. Разрешите установку из неизвестных источников
            4. Установите → откройте GLUSH → нажмите "Подключить VPN"

            > ⚡ Работает на Android 5.0+ · Samsung, Xiaomi, OPPO, Honor и др.
          files: /tmp/GLUSH-android-${{ github.run_number }}.apk
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 9. Update apps.json with Android download link ───────────────────────
      - name: Update apps.json with Android link
        run: |
          python3 backwoods/scripts/update-altstore.py \
            --android-url "https://github.com/${{ github.repository }}/releases/download/android-build-${{ github.run_number }}/GLUSH-android-${{ github.run_number }}.apk" \
            --android-size "$(stat -c%s /tmp/GLUSH-android-${{ github.run_number }}.apk)" \
            backwoods/docs/apps.json

      - name: Commit updated apps.json
        working-directory: backwoods
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/apps.json
          git diff --staged --quiet || \
            git commit -m "ci(android): update apps.json with build-${{ github.run_number }} APK link"
          git pull --rebase origin main
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
